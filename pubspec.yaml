name: open_baby_sara
description: "Sara Baby Tracker helps parents log sleep, feedings, milestones, and more — all in one app."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.3.0

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  introduction_screen: ^3.1.17
  easy_localization: ^3.0.7+1
  shared_preferences: ^2.5.3
  flutter_screenutil: ^5.9.3
  bottom_picker: ^3.0.0
  gender_picker: ^1.1.0
  firebase_core: ^3.13.0
  get_it: ^8.0.3
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  flutter_bloc: ^9.1.0
  bloc: ^9.0.0
  meta: ^1.16.0
  uuid: ^4.5.1
  intl: ^0.20.2
  convex_bottom_bar: ^3.2.0
  firebase_storage: ^12.4.5
  image_picker: ^1.1.2
  sqflite: ^2.4.2
  connectivity_plus: ^6.1.4
  path: ^1.9.0
  another_flushbar: ^1.12.30
  duration_picker: ^1.2.0
  flutter_datetime_picker_plus: ^2.2.0
  keyboard_actions: ^4.2.0
  teeth_selector: ^0.2.2
  table_calendar: ^3.1.3
  just_audio: ^0.10.3
  audioplayers: ^6.4.0
  path_provider: ^2.1.5
  flutter_slidable: ^3.0.1
  auto_size_text: ^3.0.0
  firebase_analytics: ^11.5.2
  firebase_remote_config: ^5.5.0
  package_info_plus: ^8.3.0
  url_launcher: ^6.3.2
  flutter_native_splash: ^2.4.6
  share_plus: ^11.0.0
  in_app_review: ^2.0.10
  google_sign_in: ^6.2.1




dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3


  flutter_lints: ^5.0.0




flutter:

  uses-material-design: true

  assets:
   - assets/images/
   - assets/icons/
   - lib/l10n/
   - assets/data/
   - assets/sounds/
   - assets/data/recipes.json
   - assets/images/recipes_images/

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"

flutter_native_splash:
  color: "#7B42F6"
  image: assets/icons/logo.png
  android: true
  ios: true


